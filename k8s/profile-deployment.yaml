apiVersion: apps/v1
kind: Deployment
metadata:
  name: profile-service
  namespace: mern-app
spec:
  replicas: 2

  selector:
    matchLabels:
      app: profile-service

  template:
    metadata:
      labels:
        app: profile-service

    spec:
      containers:
      - name: profile-service
        image: 928705892222.dkr.ecr.eu-north-1.amazonaws.com/profile-service:latest
        imagePullPolicy: Always

        ports:
        - containerPort: 3002

        env:
        - name: PORT
          value: "3002"

        - name: MONGO_URL
          valueFrom:
            secretKeyRef:
              name: mongodb-secret
              key: MONGO_URL

        readinessProbe:
          httpGet:
            path: /health
            port: 3002
          initialDelaySeconds: 10
          periodSeconds: 10

        livenessProbe:
          httpGet:
            path: /health
            port: 3002
          initialDelaySeconds: 20
          periodSeconds: 20