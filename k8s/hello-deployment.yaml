apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-service
  namespace: mern-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hello-service
  template:
    metadata:
      labels:
        app: hello-service
    spec:
      containers:
      - name: hello-service
        image: 928705892222.dkr.ecr.eu-north-1.amazonaws.com/hello-service:latest
        imagePullPolicy: Always

        ports:
        - containerPort: 3001

        env:
        - name: PORT
          value: "3001"

        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 10

        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 15
          periodSeconds: 20