apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: mern-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
      - name: frontend
        image: 928705892222.dkr.ecr.eu-north-1.amazonaws.com/frontend:latest 
        imagePullPolicy: Always

        ports:
        - containerPort: 80